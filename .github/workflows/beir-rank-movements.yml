name: BEIR Rank Movements

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  rank-movements:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        dataset: [arguana, scifact, nfcorpus]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Convert dataset
        run: >-
          python -m structure_rerank.beir_adapter
          --dataset ${{ matrix.dataset }}
          --out results/beir/${{ matrix.dataset }}
          --max-queries 200
          --max-corpus 8000

      - name: Run vector experiment
        run: >-
          python -m structure_rerank.vector_experiment
          --posts results/beir/${{ matrix.dataset }}/posts.jsonl
          --queries results/beir/${{ matrix.dataset }}/queries.jsonl
          --structures results/beir/${{ matrix.dataset }}/structures.jsonl
          --output results/beir/${{ matrix.dataset }}/vector_results.jsonl

      - name: Generate vertical rank movements
        run: >-
          python -m structure_rerank.explain_moves
          --results results/beir/${{ matrix.dataset }}/vector_results.jsonl
          --judgments results/beir/${{ matrix.dataset }}/judgments.jsonl
          --explanations-md results/beir/${{ matrix.dataset }}/vertical_rank_movements.md
          --explanations-json results/beir/${{ matrix.dataset }}/vertical_rank_movements.json
          --baseline-mode vector_baseline
          --compare-mode vertical_vector_rerank
          --skip-rerank

      - name: Commit rank movements
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add results/beir/${{ matrix.dataset }}/vertical_rank_movements.md results/beir/${{ matrix.dataset }}/vertical_rank_movements.json
          if git diff --cached --quiet; then
            echo "no rank movement changes"
          else
            git commit -m "results: refresh BEIR ${{ matrix.dataset }} vertical rank movements [skip ci]"
            git push || true
          fi
