name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate JSONL files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in Path('examples').glob('*.jsonl'):
              for line_no, line in enumerate(path.read_text(encoding='utf-8').splitlines(), start=1):
                  if line.strip():
                      json.loads(line)
              print(f'valid jsonl: {path}')
          PY
      - name: Import modules
        run: |
          python - <<'PY'
          import structure_rerank.angle_sweep
          import structure_rerank.beir_adapter
          import structure_rerank.vector_experiment
          PY
