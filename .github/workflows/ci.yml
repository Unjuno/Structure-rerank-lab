name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sample-experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate JSONL files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in Path('examples').glob('*.jsonl'):
              for line_no, line in enumerate(path.read_text(encoding='utf-8').splitlines(), start=1):
                  if not line.strip():
                      continue
                  json.loads(line)
              print(f'valid jsonl: {path}')
          PY

      - name: Run lexical sample rerank
        run: python -m structure_rerank.rerank

      - name: Run lexical evaluation
        run: python -m structure_rerank.evaluate --skip-rerank

      - name: Generate lexical feedback report
        run: python -m structure_rerank.feedback --skip-rerank

      - name: Generate lexical diagnostics report
        run: python -m structure_rerank.diagnose --skip-rerank

      - name: Generate lexical rank movement explanations
        run: python -m structure_rerank.explain_moves --skip-rerank

      - name: Run vector experiment
        run: python -m structure_rerank.vector_experiment

      - name: Evaluate vector experiment
        run: python -m structure_rerank.evaluate --results results/vector_results.jsonl --skip-rerank

      - name: Generate vector mode feedback report
        run: >-
          python -m structure_rerank.mode_feedback
          --results results/vector_results.jsonl
          --output-md results/vector_feedback.md
          --output-json results/vector_feedback.json
          --baseline-mode vector_baseline
          --candidate-mode vector_structure_rerank

      - name: Generate vector rank movement explanations
        run: >-
          python -m structure_rerank.explain_moves
          --results results/vector_results.jsonl
          --explanations-md results/vector_rank_movements.md
          --explanations-json results/vector_rank_movements.json
          --baseline-mode vector_baseline
          --compare-mode vector_structure_rerank
          --skip-rerank

      - name: Upload experiment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: structure-rerank-feedback
          path: |
            results/sample_results.jsonl
            results/feedback.md
            results/feedback.json
            results/diagnostics.md
            results/diagnostics.json
            results/rank_movements.md
            results/rank_movements.json
            results/vector_results.jsonl
            results/vector_feedback.md
            results/vector_feedback.json
            results/vector_rank_movements.md
            results/vector_rank_movements.json
